name: CI + Deploy

on:
  pull_request:
    branches: [dev, prod]
  push:
    # Direct pushes are blocked by branch protection on dev/prod, so the only
    # way this fires is when a PR is merged. Each merge target triggers the
    # corresponding deploy:
    #   - merge into dev  -> deploy-dev  (wiki-mcp-dev worker)
    #   - merge into prod -> deploy      (wiki-mcp worker)
    branches: [dev, prod]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm test

  deploy-dev:
    needs: test
    # Fires on push to dev (i.e. PR merged into dev).
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Deploy to Cloudflare Workers (dev environment)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          packageManager: pnpm
          command: deploy --env dev

  deploy:
    needs: test
    # Fires on push to prod (i.e. PR merged into prod).
    if: github.event_name == 'push' && github.ref == 'refs/heads/prod'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Deploy to Cloudflare Workers (prod)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          packageManager: pnpm
